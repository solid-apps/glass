      h("div", { class: "row" }, h("div", { class: "lbl" }, "Glass blur"),
        h("div", { class: "val" },
          h("input", { type: "range", min: 4, max: 40, value: Store.data.blur,
            oninput: e => { Store.data.blur = +e.target.value; Store.save(); applyTheme(); } }),
          h("span", { class: "muted small" }, Store.data.blur + "px"))),
      h("h2", { style: { fontSize: "17px", marginTop: "10px" } }, "Sound"),
      h("div", { class: "row" }, h("div", { class: "lbl" }, "Volume"),
        h("div", { class: "val" },
          h("input", { type: "range", min: 0, max: 100, value: Store.data.volume * 100,
            oninput: e => { Store.data.volume = +e.target.value / 100; Store.save(); } }),
          h("span", { class: "muted small" }, Math.round(Store.data.volume * 100) + "%"))),
      h("h2", { style: { fontSize: "17px", marginTop: "10px" } }, "Notifications"),
      h("div", { class: "row" }, h("div", { class: "lbl" }, "Allow"),
        h("div", { class: "switch" + (Store.data.notifs ? " on" : ""), onclick: e => { Store.data.notifs = !Store.data.notifs; Store.save(); e.target.classList.toggle("on", Store.data.notifs); } })),
      h("h2", { style: { fontSize: "17px", marginTop: "10px" } }, "Storage"),
      h("div", { class: "row" }, h("div", { class: "lbl" }, "Saved data"),
        h("button", { class: "btn danger", onclick: () => { localStorage.removeItem(Store.key); notify("Settings reset", "Reloading…", "🗑️"); setTimeout(() => location.reload(), 800); } }, "Reset & Reload")));
  }
  body.append(h("div", { class: "content", style: { overflowY: "auto" } }, content));
  paint();
}

/* ============================== APP: TRASH ============================== */
function buildTrash(body, win) {
  const content = h("div", { class: "content" });
  const status = h("div", { class: "statusbar" });
  function paint() {
    const items = VFS.ls("/.Trash") || [];
    content.replaceChildren(items.length
      ? h("div", { class: "list" }, items.map(n =>
          h("div", { class: "li" },
            h("span", { class: "li-ico" }, iconFor(n)),
            h("span", { class: "li-name" }, n.name),
            h("span", { class: "li-meta" }, "from " + (n._from || "?")),
            h("button", { class: "tbtn", onclick: () => { VFS.restore(n.name); notify("Restored", n.name, "♻️"); paint(); renderDeskIcons(); } }, "Put Back"))))
      : h("div", { class: "pad muted center", style: { paddingTop: "40px" } }, "🗑️", h("div", { style: { marginTop: "8px" } }, "Trash is empty")));
    status.textContent = items.length + " items";
  }
  body.append(
    h("div", { class: "toolbar" },
      h("span", { class: "muted small" }, "Deleted files live here"),
      h("span", { class: "spacer" }),
      h("button", { class: "btn danger", onclick: () => {
          const t = VFS.node("/.Trash"); if (t) t.children = {};
          notify("Trash emptied", "", "🗑️"); paint();
        } }, "Empty Trash")),
    content, status);
  paint();
}

/* ============================== APP REGISTRY ============================== */
const APPS = {
  finder:     { name: "Files",     icon: "📁", w: 780, h: 500, title: "Files",     build: buildFinder },
  safari:     { name: "Compass",     icon: "🧭", w: 720, h: 520, title: "Compass",     build: buildSafari },
  notes:      { name: "Notes",      icon: "📝", w: 620, h: 440, title: "Notes",      build: buildNotes },
  photos:     { name: "Photos",     icon: "🖼️", w: 560, h: 440, title: "Photos",     build: buildPhotos },
  music:      { name: "Music",      icon: "🎵", w: 380, h: 520, title: "Music",      build: buildMusic },
  calculator: { name: "Calculator", icon: "🧮", w: 300, h: 430, title: "Calculator", build: buildCalc },
  terminal:   { name: "Terminal",   icon: "💻", w: 600, h: 400, title: "Terminal",   build: buildTerminal, multi: true },
  weather:    { name: "Weather",    icon: "🌤️", w: 380, h: 430, title: "Weather",    build: buildWeather },
  clock:      { name: "Clock",      icon: "⏰", w: 380, h: 430, title: "Clock",      build: buildClock },
  settings:   { name: "Settings",   icon: "⚙️", w: 540, h: 480, title: "Settings",   build: buildSettings },
  trash:      { name: "Trash",      icon: "🗑️", w: 480, h: 340, title: "Trash",      build: buildTrash },
  about:      { name: "About",      icon: "❖", w: 420, h: 480, title: "About Glass", build: buildAbout, hidden: true },
  help:       { name: "Help",       icon: "❓", w: 460, h: 400, title: "Help",        build: buildHelp, hidden: true },
};
const DOCK_ORDER = ["finder", "safari", "notes", "photos", "music", "calculator", "terminal", "weather", "clock", "-", "settings", "trash"];

/* ============================== BOOT ============================== */
function boot() {
  Store.load();
  applyTheme();
  seedVFS();
  for (let i = 1; i <= 9; i++) VFS.write(`/Photos/Photo ${i}.png`, genArt(i), "/", "image/png");
  for (const id of ["finder", "safari", "notes", "photos", "music", "calculator", "terminal", "weather", "clock", "settings"]) {
    const n = VFS.write(`/Applications/${APPS[id].name}.app`, "", "/");
    n.appId = id;
  }
  renderMenubar();
  renderDock();
  renderDeskIcons();
  renderWidgets();

  // spotlight input
  const si = $("#spotInput");
  si.addEventListener("input", e => renderSpot(e.target.value));
  si.addEventListener("keydown", e => {
    const n = Math.min(spotResults.length, 9);
    if (e.key === "ArrowDown") { e.preventDefault(); spotSel = Math.min(spotSel + 1, n - 1); paintSpotSel(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); spotSel = Math.max(spotSel - 1, 0); paintSpotSel(); }
    else if (e.key === "Enter") { const r = spotResults[spotSel]; if (r) { r.run(); closeSpot(); } }
  });
  document.addEventListener("pointerdown", e => {
    if (!e.target.closest("#spot") && !e.target.closest("#mbSpotBtn")) closeSpot();
    if (!e.target.closest(".dico")) $$(".dico.sel").forEach(d => d.classList.remove("sel"));
  });
  $("#desktop").addEventListener("contextmenu", deskContextMenu);

  // subtle wallpaper parallax
  document.addEventListener("mousemove", e => {
    const x = (e.clientX / innerWidth - 0.5) * 2, y = (e.clientY / innerHeight - 0.5) * 2;
    $("#bg").style.transform = `translate(${x * -8}px, ${y * -6}px) scale(1.02)`;
  });

  if (!Store.data.seen) {
    Store.data.seen = true; Store.save();
    openApp("about");
  }
  setTimeout(() => notify("Welcome to Glass", "Press ⌘Space to search · F3 for Overview", "👋"), 900);
}
boot();
</script>
